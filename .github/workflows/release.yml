name: Release

# Triggered by the version tags that the in-app "Release" button pushes
# (e.g. v0.1.1). Can also be run manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# electron-builder needs write access to create/update the GitHub Release.
permissions:
  contents: write

jobs:
  release:
    strategy:
      # Build every platform even if one fails, so the draft gets as many
      # installers as possible in one run.
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          # Pinned to windows-2022 (VS 2022) on purpose. windows-latest moved to
          # the VS 2026 image, which node-gyp can't detect yet — electron-rebuild's
          # native compile of node-pty (no prebuilds) fails during VS discovery.
          # Revisit windows-latest once the node-gyp toolchain supports VS 2026.
          - os: windows-2022
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Match the Node version Electron 42 bundles, and satisfy Vite 7's
          # Node >= 20.19 / 22.12 requirement.
          node-version: 22
          cache: npm

      # The committed package-lock.json is generated on the dev machine, so it
      # only contains an installed package node for that platform's rollup native
      # binary (npm bug #4828). On other platforms `npm install` trusts the
      # lockfile as complete and never fetches the missing binary (e.g.
      # @rollup/rollup-win32-x64-msvc), breaking the build. Deleting the lockfile
      # forces npm to resolve a fresh, platform-correct tree on each runner and
      # pull the right per-platform binary. Cross-platform delete via node so it
      # works on both the macOS (bash) and Windows (pwsh) runners.
      - name: Remove platform-specific lockfile
        run: node -e "require('fs').rmSync('package-lock.json',{force:true})"

      # `npm install` (not `npm ci`) so it can build the tree without a lockfile.
      # Its postinstall also runs electron-rebuild so node-pty matches this
      # platform's Electron ABI.
      - name: Install dependencies
        run: npm install

      - name: Build renderer & main
        run: npm run build

      # electron-builder uploads the installers directly to a DRAFT GitHub
      # Release as release assets. We deliberately do NOT use
      # actions/upload-artifact, so nothing is charged to the artifact quota.
      - name: Package & publish to draft release
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No signing certs in CI — skip macOS auto-discovery so the build
          # doesn't fail trying to sign/notarize.
          CSC_IDENTITY_AUTO_DISCOVERY: false
